<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>X Clone</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r161/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <style>
    :root {
      --bg: #000;
      --text: #fff;
      --border: #333;
      --secondary: #71767b;
      --profile: #333;
      --logo-size: clamp(20px, 6vw, 24px);
      --btn-font: clamp(13px, 3.5vw, 15px);
      --transition: cubic-bezier(0.25, 0.46, 0.45, 0.94);
      --blue: #1d9bf0;
    }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      touch-action: manipulation;
    }
    header {
      position: fixed; top: 0; left: 0; right: 0;
      height: 50px; background: var(--bg);
      display: flex; align-items: center;
      z-index: 10; border-bottom: 1px solid var(--border);
      padding-top: env(safe-area-inset-top, 0);
    }
    .left-section { flex: 1; display: flex; justify-content: flex-start; }
    .user-section { width: 32px; height: 32px; cursor: pointer; border-radius: 50%; overflow: hidden; position: relative; }
    .user-pic { width: 100%; height: 100%; background: var(--profile); display: flex; align-items: center; justify-content: center; }
    .center-section { position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%); pointer-events: none; }
    .logo { font-size: var(--logo-size); }
    .right-section { flex: 1; display: flex; justify-content: flex-end; }
    #feed-switch {
      background: none; border: none; color: var(--text);
      font-size: var(--btn-font); cursor: pointer;
      padding: 8px 16px 8px 8px; border-radius: 20px;
      transition: color 0.1s ease;
    }
    #feed-switch:hover { color: var(--blue); }
    #feed-switch::after { content: ' ▼'; font-size: 0.8em; color: var(--blue); margin-left: 4px; }
    #user-dropdown, #dropdown {
      position: absolute; top: 100%;
      background: var(--bg); border: 1px solid var(--border);
      min-width: 140px; opacity: 0; transform: translateY(-8px);
      transition: opacity 0.2s ease, transform 0.2s ease;
      pointer-events: none; z-index: 11;
    }
    #user-dropdown.show, #dropdown.show {
      opacity: 1; transform: translateY(0);
      pointer-events: auto;
    }
    #user-dropdown div, #dropdown div {
      padding: 12px 16px; cursor: pointer; border-bottom: 1px solid var(--border);
    }
    #user-dropdown div:hover, #dropdown div:hover { background: rgba(255,255,255,0.05); }
    main {
      position: relative; top: 50px;
      height: calc(100vh - 50px);
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    .feed { position: absolute; top: 0; left: 0; width: 100%; }
    .feed:not(.active) { display: none; }
    .post { display: flex; padding: 16px; border-bottom: 1px solid var(--border); }
    .profile-pic { width: 40px; height: 40px; background: var(--profile); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; margin-right: 12px; }
    .post-header { display: flex; align-items: center; margin-bottom: 8px; flex: 1; }
    .name { font-weight: 700; margin: 0 0 2px 0; }
    .handle, .time { color: var(--secondary); font-size: 14px; }
  </style>
</head>
<body>
  <div id="app">
    <header>
      <div class="left-section">
        <div class="user-section" id="user-section">
          <div class="user-pic"><span>👤</span></div>
          <div id="user-dropdown">
            <div>Profile</div>
            <div>Settings</div>
            <div>Logout</div>
          </div>
        </div>
      </div>
      <div class="center-section"><div class="logo">𝕏</div></div>
      <div class="right-section">
        <button id="feed-switch" aria-haspopup="true" aria-expanded="false">For You</button>
        <div id="dropdown">
          <div data-index="0">For You</div>
          <div data-index="1">Following</div>
          <div data-index="2">News</div>
          <div data-index="3">Community</div>
        </div>
      </div>
    </header>
    <main>
      <div id="feed-for-you" class="feed active"><div class="post"><div class="profile-pic">😀</div><div><div class="name">Alice</div><div class="handle">@alice</div></div></div></div>
      <div id="feed-following" class="feed"><div class="post"><div class="profile-pic">👩‍💻</div><div><div class="name">Dana</div><div class="handle">@dev</div></div></div></div>
      <div id="feed-news" class="feed"><div class="post"><div class="profile-pic">📰</div><div><div class="name">News</div><div class="handle">@news</div></div></div></div>
      <div id="feed-community" class="feed"><div class="post"><div class="profile-pic">🤝</div><div><div class="name">Community</div><div class="handle">@comm</div></div></div></div>
    </main>
  </div>

<script>
  const feeds = document.querySelectorAll('.feed');
  const feedNames = ['For You', 'Following', 'News', 'Community'];
  let currentFeedIndex = 0;

  const button = document.getElementById('feed-switch');
  const dropdown = document.getElementById('dropdown');
  const userSection = document.getElementById('user-section');
  const userDropdown = document.getElementById('user-dropdown');

  // Toggle dropdown menu
  button.addEventListener('click', (e) => {
    e.stopPropagation();
    dropdown.classList.toggle('show');
    userDropdown.classList.remove('show');
  });

  userSection.addEventListener('click', (e) => {
    e.stopPropagation();
    userDropdown.classList.toggle('show');
    dropdown.classList.remove('show');
  });

  document.addEventListener('click', () => {
    dropdown.classList.remove('show');
    userDropdown.classList.remove('show');
  });

  dropdown.querySelectorAll('div').forEach(item => {
    item.addEventListener('click', () => {
      const index = parseInt(item.getAttribute('data-index'));
      switchFeed(index);
      dropdown.classList.remove('show');
    });
  });

  function switchFeed(newIndex, dir = 1) {
    if (newIndex === currentFeedIndex) return;
    const oldFeed = feeds[currentFeedIndex];
    const newFeed = feeds[newIndex];
    newFeed.style.display = 'block';
    gsap.set(newFeed, { xPercent: dir * 100 });
    gsap.to(oldFeed, { xPercent: -dir * 100, duration: 0.4, ease: 'power2.out' });
    gsap.to(newFeed, {
      xPercent: 0,
      duration: 0.4,
      ease: 'power2.out',
      onComplete: () => {
        oldFeed.classList.remove('active');
        oldFeed.style.display = 'none';
        newFeed.classList.add('active');
        gsap.set(newFeed, { clearProps: 'xPercent' });
        currentFeedIndex = newIndex;
        button.textContent = feedNames[newIndex];
      }
    });
  }

  // Swipe handling
  let startX = 0;
  let endX = 0;
  const swipeArea = document.querySelector('main');

  swipeArea.addEventListener('touchstart', (e) => {
    startX = e.touches[0].clientX;
  });

  swipeArea.addEventListener('touchmove', (e) => {
    endX = e.touches[0].clientX;
  });

  swipeArea.addEventListener('touchend', () => {
    const deltaX = endX - startX;
    if (Math.abs(deltaX) > 50) {
      if (deltaX < 0 && currentFeedIndex < feeds.length - 1) {
        switchFeed(currentFeedIndex + 1, 1);
      } else if (deltaX > 0 && currentFeedIndex > 0) {
        switchFeed(currentFeedIndex - 1, -1);
      }
    }
  });
</script>
</body>
</html>
